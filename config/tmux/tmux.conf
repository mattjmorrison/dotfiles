unbind-key C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix

bind-key \\ split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"

bind-key -n C-h if -F "#{@pane-is-vim}" "send-keys C-h" "select-pane -L"
bind-key -n C-j if -F "#{@pane-is-vim}" "send-keys C-j" "select-pane -D"
bind-key -n C-k if -F "#{@pane-is-vim}" "send-keys C-k" "select-pane -U"
bind-key -n C-l if -F "#{@pane-is-vim}" "send-keys C-l" "select-pane -R"

bind-key -n M-h if -F "#{@pane-is-vim}" "send-keys M-h" "resize-pane -L 3"
bind-key -n M-j if -F "#{@pane-is-vim}" "send-keys M-j" "resize-pane -D 3"
bind-key -n M-k if -F "#{@pane-is-vim}" "send-keys M-k" "resize-pane -U 3"
bind-key -n M-l if -F "#{@pane-is-vim}" "send-keys M-l" "resize-pane -R 3"

set-window-option -g mode-keys vi
set-option -g status-keys vi

set-option -g status-style "fg=#c0caf5,bg=#1a1b26"
set-window-option -g window-status-current-style "fg=#1a1b26,bg=#7dcfff,bold"
set-window-option -g window-status-style "fg=#c0caf5,bg=#1a1b26"
set-option -g status-left-style "fg=#1a1b26,bg=#7dcfff,bold"
set-option -g status-left " #S "
set-option -g status-right-style "fg=#7dcfff,bg=#1a1b26"
set-option -g status-right "#{?client_prefix, prefix ,}#{?window_zoomed_flag, zoom ,}#{?pane_synchronized, sync ,}#{pane_current_command} "
set-option -g message-style "fg=#1a1b26,bg=#7dcfff"

set-option -g mouse on
