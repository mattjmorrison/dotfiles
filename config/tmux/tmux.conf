unbind-key C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix

bind-key \\ split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"

bind-key -n C-h if -F "#{@pane-is-vim}" "send-keys C-h" "select-pane -L"
bind-key -n C-j if -F "#{@pane-is-vim}" "send-keys C-j" "select-pane -D"
bind-key -n C-k if -F "#{@pane-is-vim}" "send-keys C-k" "select-pane -U"
bind-key -n C-l if -F "#{@pane-is-vim}" "send-keys C-l" "select-pane -R"

bind-key -n M-h if -F "#{@pane-is-vim}" "send-keys M-h" "resize-pane -L 3"
bind-key -n M-j if -F "#{@pane-is-vim}" "send-keys M-j" "resize-pane -D 3"
bind-key -n M-k if -F "#{@pane-is-vim}" "send-keys M-k" "resize-pane -U 3"
bind-key -n M-l if -F "#{@pane-is-vim}" "send-keys M-l" "resize-pane -R 3"

set-option -g renumber-windows on
set-window-option -g mode-keys vi
set-option -g status-keys vi

# Color palette
set-option -g @col-bar    "#1a1b26"
set-option -g @col-grey   "#565f89"
set-option -g @col-purple "#bb9af7"
set-option -g @col-cyan   "#7dcfff"
set-option -g @col-text   "#c0caf5"

# Body styles
set-option -gF @style-tmux     "#[fg=#{@col-bar},bg=#{@col-purple},bold]"
set-option -gF @style-active   "#[fg=#{@col-bar},bg=#{@col-cyan},bold]"
set-option -gF @style-inactive "#[fg=#{@col-text},bg=#{@col-grey}]"
set-option -gF @style-border   "#[fg=#{@col-bar}]"

# Trailing chevron styles
# dark wedge inside the tab's bg = the > divider between tabs
set-option -gF @arrow-on-grey  "#[fg=#{@col-bar},bg=#{@col-grey}]"
set-option -gF @arrow-on-cyan  "#[fg=#{@col-bar},bg=#{@col-cyan}]"
# tab-color wedge tapering into bar bg = the closing chevron on the last tab
set-option -gF @arrow-grey-end "#[fg=#{@col-grey},bg=#{@col-bar}]"
set-option -gF @arrow-cyan-end "#[fg=#{@col-cyan},bg=#{@col-bar}]"
set-option -gF @arrow-tmux     "#[fg=#{@col-purple},bg=#{@col-bar}]"

set-option -g status-style "fg=#{@col-text},bg=#{@col-bar}"
set-window-option -g window-status-style "fg=#{@col-text},bg=#{@col-bar}"
set-option -g status-left "#{@style-tmux} TMUX #{@arrow-tmux}"
set-window-option -g window-status-current-format "#{@arrow-on-cyan}#{@style-active} #I #W #{@arrow-cyan-end}"
set-window-option -g window-status-format        "#{@arrow-on-grey}#{@style-inactive} #I #W #{@arrow-grey-end}"
set-window-option -g window-status-separator ""

set-option -g status-right ""
set-option -g status-right-length 0
set-option -g message-style "fg=#{@col-bar},bg=#{@col-cyan}"

set-option -g mouse on
